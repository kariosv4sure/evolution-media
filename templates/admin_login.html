{% extends "base.html" %}

{% block title %}Admin Login | Evolution Media{% endblock %}

{% block extra_css %}
<style>
    .auth-section {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4rem 0;
        background: linear-gradient(135deg, var(--dark) 0%, var(--dark-soft) 100%);
    }
    
    .auth-container {
        max-width: 450px;
        width: 100%;
        background: var(--gray);
        border-radius: 24px;
        padding: 2.5rem;
        border: 1px solid rgba(255,255,255,0.05);
        box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    
    .auth-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    
    .auth-header .auth-icon {
        width: 70px;
        height: 70px;
        background: rgba(211, 47, 47, 0.15);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1rem;
    }
    
    .auth-header .auth-icon i {
        font-size: 2rem;
        color: var(--primary);
    }
    
    .auth-header h2 {
        font-size: 1.8rem;
        margin-bottom: 0.5rem;
    }
    
    .auth-header p {
        color: var(--text-muted);
        font-size: 0.9rem;
    }
    
    .admin-badge {
        display: inline-block;
        background: rgba(211, 47, 47, 0.2);
        border: 1px solid var(--primary);
        padding: 4px 12px;
        border-radius: 60px;
        font-size: 0.7rem;
        font-weight: 600;
        color: var(--primary);
        margin-bottom: 1rem;
    }
    
    .form-group {
        margin-bottom: 1.5rem;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--text);
    }
    
    .form-group input {
        width: 100%;
        padding: 12px 16px;
        background: var(--dark-soft);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        font-family: inherit;
        font-size: 1rem;
        color: var(--text);
        transition: 0.3s;
    }
    
    .form-group input:focus {
        outline: none;
        border-color: var(--primary);
    }
    
    .auth-btn {
        width: 100%;
        padding: 14px;
        font-size: 1rem;
        justify-content: center;
        margin-top: 0.5rem;
    }
    
    .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid rgba(255,255,255,0.1);
    }
    
    .auth-footer a {
        color: var(--primary);
        text-decoration: none;
    }
    
    @media (max-width: 640px) {
        .auth-container {
            margin: 0 20px;
            padding: 1.5rem;
        }
        
        .auth-header h2 {
            font-size: 1.5rem;
        }
    }
</style>
{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-container" data-aos="fade-up">
            <div class="auth-header">
                <div class="admin-badge">Administrator Access</div>
                <div class="auth-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h2>Admin Login</h2>
                <p>Secure access to Evolution Media dashboard</p>
            </div>
            
            <form method="POST" action="{{ url_for('admin_login') }}">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter admin username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter admin password">
                </div>
                
                <button type="submit" class="btn btn-primary auth-btn">
                    <i class="fas fa-lock"></i> Login as Admin
                </button>
            </form>
            
            <div class="auth-footer">
                <a href="{{ url_for('index') }}"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
